<!-- TopAppBar -->
<header class="bg-slate-950 text-emerald-500 font-sans text-[clamp(0.65rem,1.4vw,0.875rem)] tracking-wide uppercase border-b border-slate-800 flex justify-between items-center w-full z-50 shrink-0 px-[clamp(0.5rem,2vw,1.25rem)] py-2 min-h-[2.75rem]">

</div>
<div class="flex items-center gap-4">
<button type="button" id="coach-toggle" py-click="handle_coach_toggle" class="flex items-center gap-2 px-3 py-1 bg-slate-900 rounded-full border border-slate-800 cursor-pointer" aria-pressed="true" aria-label="Toggle coach mode">
<span class="text-ui-label text-slate-400">Coach Mode</span>
<div id="coach-toggle-track" class="w-8 h-4 rounded-full relative transition-colors bg-emerald-500">

</div>

</div>

<div class="poker-table-stage">
<div class="poker-table-surface border border-slate-800 poker-table-gradient">
<!-- Pot + community cards: stacked so pot sits directly above the board (felt-relative sizing). -->
<div class="board-pot-stack w-full min-w-0 shrink-0 flex flex-col items-center z-10">
<div class="pot-above-board flex flex-col items-center text-center">
<span class="pot-label text-slate-500 uppercase tracking-widest">Total Pot</span>
<span id="total-pot" class="pot-total-value font-display-mono text-primary font-bold">$0.00</span>
</div>
<div id="board-cards" class="board-cards-wrap w-full min-w-0"></div>
</div>
<!-- 6 Players Distribution (5 AI + 1 User at bottom) -->
<!-- AI 1 (Top Left) ui-slot 0 -->
<div id="seat-shell-0" class="absolute top-[6%] left-[22%] z-20 -translate-x-1/2">

<div class="flex items-center gap-1.5 sm:gap-2">

<span class="material-symbols-outlined">person</span>
</div>
<div class="min-w-0 flex-1">
<div id="seat-name-0" class="text-ui-sans-bold text-slate-200 truncate">—</div>

<span id="seat-stack-0" class="font-data-mono-sm text-primary shrink-0">$0</span>

</div>
</div>
<div id="seat-role-0" class="ml-auto text-[10px] text-slate-500 font-bold shrink-0">&nbsp;</div>
</div>
<div id="seat-action-0" class="text-[10px] text-amber-400 font-semibold truncate leading-tight"></div>
<div id="seat-holes-0" class="seat-holes flex gap-0.5 sm:gap-1 justify-center items-center flex-1 min-h-0"></div>
</div>
</div>

<div class="flex items-center gap-1.5 sm:gap-2">

<!-- Comprehensive Analytical Footer -->
<footer class="app-footer bg-slate-950 border-t border-slate-800 z-50">
<div class="app-footer-inner app-footer-grid mx-auto">
<!-- Left: Hero cards, stakes, hand result -->
<div class="app-footer-col flex flex-col gap-1.5 border-slate-800 sm:border-r pr-0 sm:pr-[clamp(0.35rem,1.2vw,1rem)] py-1 justify-center shrink-0">
<div class="flex flex-wrap items-start gap-[clamp(0.3rem,1.2vw,0.85rem)]">
<div id="hero-hole-cards" class="flex gap-1 sm:gap-sm shrink-0"></div>
<div class="app-footer-hero-stacks text-slate-400">
<div class="flex flex-col gap-0 leading-tight">
<span class="hero-money-label uppercase tracking-widest">Stack</span>
<span id="hero-stack" class="hero-money-value font-display-mono text-primary">$0.00</span>
</div>
<div class="flex flex-col gap-0 leading-tight">
<span class="hero-money-label uppercase tracking-widest">To Call</span>
<span id="hero-to-call" class="hero-money-value font-display-mono text-slate-200">$0.00</span>
</div>
</div>
</div>
<div id="hand-over-banner" class="hidden w-full max-w-md px-3 py-2 rounded-lg border border-emerald-500/50 bg-slate-900/90 text-emerald-400 text-sm font-bold text-center"></div>
</div>
<!-- Middle: GTO Analysis Stats -->
<div class="app-footer-col min-w-0 flex flex-col gap-2 px-0 sm:px-[clamp(0.35rem,1.2vw,1rem)] border-slate-800 sm:border-r py-1 justify-center">
<div class="grid grid-cols-3 gap-4">
<div class="bg-surface-container-high border border-outline-variant p-2 rounded-lg">
<span class="text-[10px] text-slate-400 uppercase">Win probability</span>
<div id="stat-win-prob" class="font-display-mono text-emerald-500 font-semibold text-[clamp(0.85rem,2.5vmin,1.2rem)]">—</div>
</div>
<div class="col-span-2 bg-surface-container-high border border-outline-variant p-2 rounded-lg">
<span class="text-[10px] text-slate-400 uppercase mb-1 block">Optimal Strategy Distribution</span>
<div id="gto-bar" class="w-full bg-slate-800 rounded overflow-hidden flex font-bold text-[clamp(9px,1.5vmin,11px)] h-[clamp(1.25rem,3dvh,1.5rem)]"></div>
</div>
</div>
<div class="bg-emerald-500/5 border border-emerald-500/20 p-2 rounded-lg flex items-start gap-3">
<span class="material-symbols-outlined text-emerald-500 text-sm mt-0.5">lightbulb</span>
<p id="coach-text" class="text-[11px] text-slate-300 leading-tight"></p>
</div>
</div>
<!-- Right: Betting controls + next hand -->
<div class="app-footer-col flex flex-col gap-1.5 justify-center shrink-0 py-1">
<div id="betting-actions" class="flex flex-col gap-1">
<p id="action-error" class="footer-err text-xs text-red-400"></p>
<p id="model-error" class="footer-err text-xs text-amber-400/90"></p>
<div class="flex gap-2">
<button type="button" id="btn-fold" py-click="handle_fold" class="app-footer-btn flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-mono font-bold uppercase rounded border border-slate-700 transition-all">Fold</button>
<button type="button" id="btn-call" py-click="handle_call" class="app-footer-btn flex-1 bg-secondary-container hover:bg-secondary-container/80 text-white font-mono font-bold uppercase rounded transition-all">Check / Call</button>
</div>
<div class="flex flex-col gap-2">
<button type="button" id="btn-raise" py-click="handle_raise" class="app-footer-btn bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-mono font-bold uppercase rounded flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">trending_up</span>
Raise
</button>
<div class="flex items-center gap-4">
<input id="raise-slider" py-input="handle_raise_slider" class="flex-1 accent-emerald-500 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer" type="range" min="4" max="200" value="4"/>
<input id="raise-value" type="number" step="1" min="4" max="200" value="4" py-input="handle_raise_value_input" py-change="handle_raise_value_change" class="w-[4.5rem] shrink-0 bg-slate-900 border border-slate-800 rounded px-1 py-1 text-center font-display-mono text-primary text-xs [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" inputmode="numeric" aria-label="Raise to amount"/>
</div>
</div>
</div>

</div>
</div>
