<body class="font-ui-sans-reg text-ui-sans-reg overflow-hidden flex flex-col h-screen">
<!-- TopAppBar -->
<header class="bg-slate-950 text-emerald-500 font-sans text-sm tracking-wide uppercase border-b border-slate-800 flex justify-between items-center w-full px-6 h-14 z-50 flex-shrink-0">
<div class="flex items-center gap-8">
<span class="text-xl font-bold tracking-tighter text-slate-50">POKER SIMULATOR</span>
</div>
<div class="flex items-center gap-4">
<button type="button" id="coach-toggle" py-click="handle_coach_toggle" class="flex items-center gap-2 px-3 py-1 bg-slate-900 rounded-full border border-slate-800 cursor-pointer" aria-pressed="true" aria-label="Toggle coach mode">
<span class="text-ui-label text-slate-400">Coach Mode</span>
<div id="coach-toggle-track" class="w-8 h-4 rounded-full relative transition-colors bg-emerald-500">
<div id="coach-toggle-knob" class="absolute right-0.5 top-0.5 w-3 h-3 rounded-full shadow transition-all bg-white"></div>
</div>
</button>
</div>
</header>
<!-- Main Content Canvas (Poker Table) -->
<main class="relative flex-grow w-full flex flex-col items-center justify-center p-xl overflow-hidden">
<!-- The Table Area -->
<div class="relative w-full max-w-5xl aspect-[21/9] rounded-[240px] border border-slate-800 poker-table-gradient flex flex-col items-center justify-center">
<!-- Pot Info -->
<div class="absolute top-1/4 flex flex-col items-center">
<span class="text-ui-label text-slate-500 uppercase tracking-widest mb-1">Total Pot</span>
<span id="total-pot" class="font-display-mono text-display-mono text-primary">$0.00</span>
</div>
<!-- Community Cards -->
<div id="board-cards" class="flex gap-md items-center justify-center min-h-[7rem]"></div>
<!-- 6 Players Distribution (5 AI + 1 User at bottom) -->
<!-- AI 1 (Top Left) ui-slot 0 -->
<div id="seat-shell-0" class="absolute top-0 left-1/4 -translate-x-1/2 -translate-y-1/2">
<div id="seat-inner-0" class="bg-surface-container border border-outline-variant w-44 min-h-[10rem] p-2 rounded-lg flex flex-col gap-1">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded bg-slate-800 flex items-center justify-center text-slate-500 shrink-0">
<span class="material-symbols-outlined">person</span>
</div>
<div class="min-w-0 flex-1">
<div id="seat-name-0" class="text-ui-sans-bold text-slate-200 truncate">—</div>
<div class="flex flex-wrap items-baseline gap-x-1.5 gap-y-0">
<span id="seat-stack-0" class="font-data-mono-sm text-primary shrink-0">$0</span>
<span id="seat-bluff-0" class="text-[10px] text-slate-500 shrink-0 whitespace-nowrap">Bluff —</span>
</div>
</div>
<div id="seat-role-0" class="ml-auto text-[10px] text-slate-500 font-bold shrink-0">&nbsp;</div>
</div>
<div id="seat-action-0" class="text-[10px] text-amber-400 font-semibold truncate leading-tight"></div>
<div id="seat-holes-0" class="flex gap-1 justify-center items-center min-h-[2.75rem] flex-1"></div>
</div>
</div>
<!-- AI 2 (Top Center) ui-slot 1 -->
<div id="seat-shell-1" class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div id="seat-inner-1" class="bg-surface-container border border-outline-variant w-44 min-h-[10rem] p-2 rounded-lg flex flex-col gap-1 shadow-lg shadow-emerald-500/10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded bg-slate-800 flex items-center justify-center text-slate-500 shrink-0">
<span class="material-symbols-outlined">person</span>
</div>
<div class="min-w-0 flex-1">
<div id="seat-name-1" class="text-ui-sans-bold text-slate-200 truncate">—</div>
<div class="flex flex-wrap items-baseline gap-x-1.5 gap-y-0">

</div>

</div>

<!-- AI 4 (Right Center) ui-slot 3 -->
<div id="seat-shell-3" class="absolute top-1/2 right-0 translate-x-1/2 -translate-y-1/2">
<div id="seat-inner-3" class="bg-surface-container border border-outline-variant w-44 min-h-[10rem] p-2 rounded-lg flex flex-col gap-1">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded bg-slate-800 flex items-center justify-center text-slate-500 shrink-0">

</div>
<div class="min-w-0 flex-1">
<div id="seat-name-3" class="text-ui-sans-bold text-slate-200 truncate">—</div>
<div class="flex flex-wrap items-baseline gap-x-1.5 gap-y-0">
<span id="seat-stack-3" class="font-data-mono-sm text-primary shrink-0">$0</span>
<span id="seat-bluff-3" class="text-[10px] text-slate-500 shrink-0 whitespace-nowrap">Bluff —</span>
</div>
</div>
<div id="seat-role-3" class="ml-auto text-[10px] text-slate-500 font-bold shrink-0">&nbsp;</div>
</div>
<div id="seat-action-3" class="text-[10px] text-amber-400 font-semibold truncate leading-tight"></div>
<div id="seat-holes-3" class="flex gap-1 justify-center items-center min-h-[2.75rem] flex-1"></div>

</div>
<!-- AI 5 (Left Center) ui-slot 4 -->
<div id="seat-shell-4" class="absolute top-1/2 left-0 -translate-x-1/2 -translate-y-1/2">
<div id="seat-inner-4" class="bg-surface-container border border-outline-variant w-44 min-h-[10rem] p-2 rounded-lg flex flex-col gap-1">
<div class="flex items-center gap-3">

</div>

</div>
</div>
<!-- User (Bottom Center) ui-slot 5 -->
<div id="seat-shell-5" class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2">
<div id="seat-inner-5" class="bg-emerald-500/10 border-2 border-emerald-500 w-44 min-h-[10rem] p-2 rounded-lg flex flex-col gap-1">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded bg-emerald-500 flex items-center justify-center text-on-primary shrink-0">
<span class="material-symbols-outlined">person</span>
</div>
<div class="min-w-0 flex-1 overflow-hidden">
<div id="seat-name-5" class="text-[10px] font-bold text-emerald-400 truncate leading-tight tracking-tight">YOU</div>
<div class="flex flex-wrap items-baseline gap-x-1.5 gap-y-0">
<span id="seat-stack-5" class="font-data-mono-sm text-white shrink-0">$0</span>

</div>

</div>
</div>
</div>
</main>
<!-- Comprehensive Analytical Footer -->
<footer class="bg-slate-950 border-t border-slate-800 p-3 min-h-[160px] flex-shrink-0 z-50">
<div class="max-w-[1600px] mx-auto h-full flex gap-lg items-stretch">
<!-- Left: Hero cards, stakes, hand result -->
<div class="flex flex-col gap-2 border-r border-slate-800 pr-lg py-1 justify-center shrink-0">
<div class="flex items-start gap-lg">
<div id="hero-hole-cards" class="flex gap-sm shrink-0"></div>
<div class="flex flex-col gap-1">
<div class="flex flex-col gap-0.5">
<div class="text-[10px] text-slate-500 uppercase tracking-widest">Stack</div>
<div id="hero-stack" class="font-display-mono text-data-mono-lg text-primary leading-tight">$0.00</div>
</div>
<div class="flex flex-col gap-0.5">
<div class="text-[10px] text-slate-500 uppercase tracking-widest">To Call</div>
<div id="hero-to-call" class="font-display-mono text-data-mono-lg text-slate-200 leading-tight">$0.00</div>
</div>
</div>
</div>
<div id="hand-over-banner" class="hidden w-full max-w-md px-3 py-2 rounded-lg border border-emerald-500/50 bg-slate-900/90 text-emerald-400 text-sm font-bold text-center"></div>
</div>
<!-- Middle: GTO Analysis Stats -->
<div class="flex-1 flex flex-col gap-3 px-lg border-r border-slate-800 h-full justify-center">
<div class="grid grid-cols-3 gap-4">
<div class="bg-surface-container-high border border-outline-variant p-2 rounded-lg">
<span class="text-[10px] text-slate-400 uppercase">Win probability</span>
<div id="stat-win-prob" class="font-display-mono text-data-mono-lg text-emerald-500">—</div>
</div>
<div class="col-span-2 bg-surface-container-high border border-outline-variant p-2 rounded-lg">
<span class="text-[10px] text-slate-400 uppercase mb-1 block">Optimal Strategy Distribution</span>
<div id="gto-bar" class="w-full bg-slate-800 h-6 rounded overflow-hidden flex text-[10px] font-bold"></div>
</div>
</div>
<div class="bg-emerald-500/5 border border-emerald-500/20 p-2 rounded-lg flex items-start gap-3">
<span class="material-symbols-outlined text-emerald-500 text-sm mt-0.5">lightbulb</span>
<p id="coach-text" class="text-[11px] text-slate-300 leading-tight"></p>
</div>
</div>
<!-- Right: Betting controls + next hand -->
<div class="flex flex-col gap-2 min-w-[320px] justify-center shrink-0 py-1">
<div id="betting-actions" class="flex flex-col gap-1">
<p id="action-error" class="footer-err text-xs text-red-400"></p>
<p id="model-error" class="footer-err text-xs text-amber-400/90"></p>
<div class="flex gap-2">
<button type="button" id="btn-fold" py-click="handle_fold" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-mono text-xs font-bold uppercase py-3 rounded border border-slate-700 transition-all">Fold</button>
<button type="button" id="btn-call" py-click="handle_call" class="flex-1 bg-secondary-container hover:bg-secondary-container/80 text-white font-mono text-xs font-bold uppercase py-3 rounded transition-all">Check / Call</button>
</div>
<div class="flex flex-col gap-2">
<button type="button" id="btn-raise" py-click="handle_raise" class="bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-mono text-sm font-bold uppercase py-3 rounded flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">trending_up</span>
Raise
</button>
<div class="flex items-center gap-4">
<input id="raise-slider" py-input="handle_raise_slider" class="flex-1 accent-emerald-500 h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer" type="range" min="4" max="200" value="4"/>
<input id="raise-value" type="number" step="1" min="4" max="200" value="4" py-input="handle_raise_value_input" py-change="handle_raise_value_change" class="w-[4.5rem] shrink-0 bg-slate-900 border border-slate-800 rounded px-1 py-1 text-center font-display-mono text-primary text-xs [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" inputmode="numeric" aria-label="Raise to amount"/>
</div>
</div>
</div>
<button type="button" id="btn-next-hand" py-click="handle_next_hand" class="hidden mt-1 bg-slate-700 hover:bg-slate-600 text-white font-mono text-xs font-bold uppercase py-2 rounded border border-slate-600 w-full">Deal Next Hand</button>
</div>
</div>
</footer>
<script type="py" src="./main.py" config="./pyscript.toml"></script>
</body></html>
