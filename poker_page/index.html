<script>
(function () {
  var bluffChart = null;
  function bluffBarColor(i, hero, folded) {
    if (folded[i]) return "rgba(51,65,85,0.28)";
    if (i === hero) return "rgba(16,185,129,0.78)";
    return "rgba(139,92,246,0.78)";
  }
  /** PyScript may pass PyProxy list-like values — avoid .length / .slice assumptions. */
  function sixNums(v) {
    var out = [];
    for (var i = 0; i < 6; i++) {
      try {
        out.push(Number(v != null && v[i] !== undefined ? v[i] : 0) || 0);
      } catch (e) {
        out.push(0);
      }
    }
    return out;
  }
  function sixBools(v) {
    var out = [];
    for (var i = 0; i < 6; i++) {
      try {
        out.push(!!(v != null && v[i]));
      } catch (e) {
        out.push(false);
      }
    }
    return out;
  }
  window._initPokerCharts = function () {
    if (typeof Chart === "undefined") return;
    var fc = document.getElementById("footer-bluff-chart");
    if (fc && !bluffChart) {
      bluffChart = new Chart(fc.getContext("2d"), {
        type: "bar",
        data: {
          labels: ["1", "2", "3", "4", "5", "6"],
          datasets: [
            {
              label: "Bluff %",
              data: [0, 0, 0, 0, 0, 0],
              backgroundColor: "#64748b",
              borderRadius: 3,
              maxBarThickness: 18,
            },
          ],
        },
        options: {
          animation: false,
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function (ctx) {
                  var v = Number(ctx.parsed && ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.raw) || 0;
                  return "Bluff signal: " + v.toFixed(0) + "%";
                },
              },
            },
          },
          scales: {
            x: {
              ticks: { color: "#94a3b8", maxRotation: 0, font: { size: 9 } },
              grid: { display: false },
            },
            y: {
              min: 0,
              max: 100,
              ticks: {
                color: "#64748b",
                font: { size: 8 },
                callback: function (v) {
                  return v + "%";
                },
              },
              grid: { color: "rgba(100,116,139,0.1)" },
            },
          },
        },
      });
    }
  };
  window._updatePokerCharts = function (hero, bluffPcts, folded) {
    window._initPokerCharts();
    hero = Number(hero) || 0;
    if (!bluffChart) return;
    var b6 = sixNums(bluffPcts);
    var f6 = sixBools(folded);
    bluffChart.data.datasets[0].data = b6;
    bluffChart.data.datasets[0].backgroundColor = b6.map(function (_, i) {
      return bluffBarColor(i, hero, f6);
    });
    bluffChart.update("none");
  };
})();
